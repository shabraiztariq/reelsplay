<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="ReelPlay"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>ReelPlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap"/>

  <style>
    :root {
      --accent: #FF3B5C;
      --bg: #000;
      --surface: #111;
      --muted: rgba(255,255,255,0.4);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }
    html, body {
      width: 100%; height: 100%; height: 100dvh;
      overflow: hidden; background: #000;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #fff;
    }
    #app { width: 100%; height: 100%; height: 100dvh; position: relative; overflow: hidden; }

    /* ── EMPTY STATE ── */
    #empty-state {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .logo-wrap {
      width: 96px; height: 96px; border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 60px rgba(255,59,92,0.15);
      margin-bottom: 2.5rem; position: relative;
    }
    .logo-badge {
      position: absolute; bottom: -6px; right: -6px;
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
    }
    .app-title { font-size: 1.875rem; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 0.5rem; }
    .app-subtitle { color: var(--muted); font-size: 0.875rem; text-align: center; line-height: 1.6; margin-bottom: 3rem; }
    .pick-btn {
      width: 100%; max-width: 320px; padding: 1rem;
      border-radius: 16px; border: none; cursor: pointer;
      background: var(--accent); color: #fff;
      font-size: 1rem; font-weight: 600; letter-spacing: 0.3px;
      font-family: inherit;
      box-shadow: 0 0 30px rgba(255,59,92,0.3);
      transition: transform 0.15s; -webkit-appearance: none;
    }
    .pick-btn:active { transform: scale(0.96); }
    .pick-hint { color: rgba(255,255,255,0.2); font-size: 0.75rem; margin-top: 1.25rem; }
    .tag-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; margin-top: 3rem; }
    .tag {
      font-size: 0.7rem; padding: 0.35rem 0.75rem; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3);
    }

    /* ── REEL FEED ── */
    #reel-feed {
      width: 100%; height: 100%; height: 100dvh;
      overflow-y: scroll; scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; overscroll-behavior: contain;
      display: none;
    }
    #reel-feed::-webkit-scrollbar { display: none; }

    .reel-slide {
      width: 100%; height: 100dvh;
      scroll-snap-align: start; scroll-snap-stop: always;
      position: relative; background: #000;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }

    .reel-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      background: #000;
    }
    .reel-video.vertical   { object-fit: cover;    object-position: center; }
    .reel-video.horizontal { object-fit: contain;  object-position: center; }

    /* gradients */
    .grad-top {
      position: absolute; top: 0; left: 0; right: 0; height: 30%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
      pointer-events: none; z-index: 2;
    }
    .grad-bot {
      position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
      pointer-events: none; z-index: 2;
    }

    /* top bar */
    .slide-top {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: calc(14px + var(--safe-top)) 14px 14px;
      z-index: 10;
    }
    .slide-title {
      font-size: 0.78rem; font-weight: 500;
      color: rgba(255,255,255,0.7);
      max-width: 70%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mute-btn {
      width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
      background: rgba(0,0,0,0.35); display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      transition: transform 0.15s;
    }
    .mute-btn:active { transform: scale(0.9); }

    /* right actions */
    .slide-actions {
      position: absolute; right: 12px; bottom: 90px;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      z-index: 10;
    }
    .action-btn {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      border: none; background: none; cursor: pointer; color: white;
    }
    .action-icon {
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s;
    }
    .action-icon:active { transform: scale(0.9); }
    .action-label { font-size: 0.7rem; color: rgba(255,255,255,0.6); font-family: inherit; }

    /* progress bar */
    .progress-track {
      position: absolute; bottom: 62px; left: 0; right: 0;
      height: 2px; background: rgba(255,255,255,0.2); z-index: 10;
    }
    .progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.25s linear; }

    /* center overlay (play/pause flash, replay) */
    .center-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 8; pointer-events: none;
    }
    .center-overlay.clickable { pointer-events: auto; }
    .icon-bubble {
      background: rgba(0,0,0,0.45); backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 50%; width: 76px; height: 76px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .icon-bubble.show { opacity: 1; }
    .replay-panel {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px; padding: 20px 36px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      cursor: pointer; border: none; color: white; font-family: inherit;
    }
    .replay-panel span { font-size: 0.75rem; font-weight: 500; letter-spacing: 1.5px; }

    /* double-tap heart */
    .dt-heart {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
      pointer-events: none; z-index: 12; display: none;
    }
    .dt-heart.show { display: block; animation: dtHeart 0.7s ease forwards; }
    @keyframes dtHeart {
      0%  { transform: translate(-50%,-50%) scale(0); opacity: 1; }
      35% { transform: translate(-50%,-50%) scale(1.7); opacity: 1; }
      80% { transform: translate(-50%,-50%) scale(1.3); opacity: 0.8; }
      100%{ transform: translate(-50%,-50%) scale(0);   opacity: 0; }
    }

    /* loading spinner */
    .spinner-wrap {
      position: absolute; inset: 0; z-index: 6;
      display: none; align-items: center; justify-content: center;
    }
    .spinner-wrap.show { display: flex; }
    .spinner {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* heart icon animation */
    @keyframes heartPop {
      0%   { transform: scale(0) rotate(-15deg); }
      55%  { transform: scale(1.4) rotate(5deg); }
      80%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .heart-pop { animation: heartPop 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both; }

    /* ── TAB BAR ── */
    #tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding-bottom: var(--safe-bottom);
      z-index: 100; display: none;
      background: linear-gradient(to top, rgba(0,0,0,0.98), transparent);
    }
    .tab-inner {
      display: flex; align-items: flex-end; justify-content: space-around;
      padding: 20px 8px 12px;
    }
    .tab-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; border: none; background: none; cursor: pointer;
      color: white; padding: 4px 20px; font-family: inherit;
    }
    .tab-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); transition: color 0.2s; }
    .tab-btn.active .tab-label { color: #fff; font-weight: 500; }
    .tab-btn.active-fav .tab-label { color: var(--accent); font-weight: 500; }
    .add-center {
      display: flex; flex-direction: column; align-items: center; margin-top: -12px;
      border: none; background: none; cursor: pointer;
    }
    .add-circle {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(255,59,92,0.4);
      transition: transform 0.15s;
    }
    .add-circle:active { transform: scale(0.9); }
    .fav-badge {
      position: absolute; top: -5px; right: -8px;
      background: var(--accent); border-radius: 999px;
      padding: 1px 5px; font-size: 9px; font-weight: 700; color: white;
      display: none;
    }
    .fav-icon-wrap { position: relative; display: inline-flex; }

    /* ── FAVORITES PAGE ── */
    #favorites-page {
      position: absolute; inset: 0; background: #000;
      z-index: 50; display: none; flex-direction: column;
      padding-top: var(--safe-top);
      animation: slideUp 0.3s cubic-bezier(0.25,0.46,0.45,0.94) both;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .fav-header { padding: 1.5rem 1.25rem 1rem; flex-shrink: 0; }
    .fav-header h2 { font-size: 1.25rem; font-weight: 600; }
    .fav-header p  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .fav-grid {
      flex: 1; overflow-y: auto; padding: 0 1rem 6rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }
    .fav-grid::-webkit-scrollbar { width: 3px; }
    .fav-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .fav-card {
      aspect-ratio: 9/16; border-radius: 16px; overflow: hidden;
      background: rgba(255,255,255,0.05); position: relative;
      border: 1px solid rgba(255,255,255,0.08); cursor: pointer;
      transition: transform 0.15s;
    }
    .fav-card:active { transform: scale(0.96); }
    .fav-card video {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .fav-card-grad {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
    }
    .fav-card-name {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
      font-size: 0.7rem; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fav-play-btn {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    }
    .fav-play-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    .fav-heart-badge { position: absolute; top: 8px; right: 8px; }
    .fav-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding-bottom: 5rem;
    }
    .fav-empty p { font-size: 0.85rem; color: rgba(255,255,255,0.3); text-align: center; }

    /* ── INSTALL BANNER ── */
    #install-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      padding: 8px 12px; display: none; padding-top: calc(8px + var(--safe-top));
    }
    .install-inner {
      background: rgba(18,18,18,0.95); border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-radius: 16px; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
    }
    .install-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,59,92,0.15); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .install-text { flex: 1; }
    .install-text strong { font-size: 0.78rem; font-weight: 600; }
    .install-text span { display: block; font-size: 0.7rem; color: var(--muted); }
    .install-do {
      background: var(--accent); color: #fff; border: none; cursor: pointer;
      padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 600;
      font-family: inherit; flex-shrink: 0;
    }
    .install-dismiss {
      background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; padding: 4px;
    }

    /* fade-in */
    @keyframes fadeInUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .fade-in-up { animation: fadeInUp 0.3s ease both; }
  </style>
</head>
<body>

<div id="app">
  <!-- Empty State -->
  <div id="empty-state">
    <div class="logo-wrap">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="4" width="20" height="16" rx="3" stroke="white" stroke-width="1.5"/>
        <path d="M10 9l5 3-5 3V9z" fill="#FF3B5C"/>
        <circle cx="5.5" cy="7.5" r="1" fill="white" opacity="0.5"/>
        <circle cx="8.5" cy="7.5" r="1" fill="white" opacity="0.5"/>
      </svg>
      <div class="logo-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="white">
          <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
        </svg>
      </div>
    </div>
    <h1 class="app-title">ReelPlay</h1>
    <p class="app-subtitle">Your private offline reel player.<br>No uploads. No cloud. Just your videos.</p>
    <button class="pick-btn" onclick="pickVideos()">Pick Videos from Gallery</button>
    <p class="pick-hint">Select one or multiple videos</p>
    <div class="tag-row">
      <span class="tag">Vertical Reels</span>
      <span class="tag">Offline</span>
      <span class="tag">Favorites</span>
      <span class="tag">Installable PWA</span>
    </div>
  </div>

  <!-- Reel Feed -->
  <div id="reel-feed"></div>

  <!-- Favorites Page -->
  <div id="favorites-page">
    <div class="fav-header">
      <h2>Favorites</h2>
      <p id="fav-count-label">No favorites yet</p>
    </div>
    <div id="fav-grid" class="fav-grid"></div>
    <div id="fav-empty" class="fav-empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <p>Tap the ♥ on any video<br>to save it here</p>
    </div>
  </div>

  <!-- Tab Bar -->
  <div id="tab-bar">
    <div class="tab-inner">
      <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">
        <svg width="24" height="24" viewBox="0 0 24 24" id="home-icon" fill="white">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22" fill="none" stroke="white" stroke-width="2"/>
        </svg>
        <span class="tab-label">Reels</span>
      </button>

      <button class="add-center" onclick="addMoreVideos()">
        <div class="add-circle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
        </div>
      </button>

      <button class="tab-btn" id="tab-fav" onclick="switchTab('favorites')">
        <div class="fav-icon-wrap">
          <svg width="24" height="24" viewBox="0 0 24 24" id="fav-icon" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
          <span class="fav-badge" id="fav-badge">0</span>
        </div>
        <span class="tab-label">Saved</span>
      </button>
    </div>
  </div>

  <!-- Install Banner -->
  <div id="install-banner">
    <div class="install-inner">
      <div class="install-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#FF3B5C">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
      </div>
      <div class="install-text">
        <strong>Install ReelPlay</strong>
        <span>Add to home screen for fullscreen</span>
      </div>
      <button class="install-do" onclick="doInstall()">Install</button>
      <button class="install-dismiss" onclick="dismissInstall()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="video/*" multiple style="display:none" onchange="handleFiles(this)"/>
<input type="file" id="file-input-more" accept="video/*" multiple style="display:none" onchange="handleMoreFiles(this)"/>

<script>
// ──────────────────────────────────────────────
// State
// ──────────────────────────────────────────────
let videos = [];
let activeIndex = 0;
let isMuted = false;
let activeTab = 'home';
let favorites = [];
let installPrompt = null;
let tapTimers = {};
let tapCounts = {};
let observer = null;

// ──────────────────────────────────────────────
// Load favorites from localStorage
// ──────────────────────────────────────────────
function loadFavorites() {
  try { favorites = JSON.parse(localStorage.getItem('reelplay_favorites') || '[]'); } catch { favorites = []; }
}
function saveFavoritesLS() {
  try { localStorage.setItem('reelplay_favorites', JSON.stringify(favorites)); } catch {}
}
function loadLastIndex() {
  try { return parseInt(localStorage.getItem('reelplay_last_index') || '0', 10) || 0; } catch { return 0; }
}
function saveLastIndex(i) {
  try { localStorage.setItem('reelplay_last_index', String(i)); } catch {}
}

loadFavorites();

// ──────────────────────────────────────────────
// PWA Install
// ──────────────────────────────────────────────
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  installPrompt = e;
  setTimeout(() => { document.getElementById('install-banner').style.display = 'block'; }, 3000);
});
window.addEventListener('appinstalled', () => {
  installPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});

function doInstall() {
  if (!installPrompt) return;
  installPrompt.prompt();
  installPrompt.userChoice.then(() => {
    installPrompt = null;
    document.getElementById('install-banner').style.display = 'none';
  });
}
function dismissInstall() {
  document.getElementById('install-banner').style.display = 'none';
}

// ──────────────────────────────────────────────
// File handling
// ──────────────────────────────────────────────
function pickVideos() { document.getElementById('file-input').click(); }
function addMoreVideos() { document.getElementById('file-input-more').click(); }

function handleFiles(input) {
  const files = Array.from(input.files || []).filter(f => f.type.startsWith('video/'));
  if (!files.length) return;
  // Revoke old URLs
  videos.forEach(v => { try { URL.revokeObjectURL(v.url); } catch {} });
  videos = files.map(f => ({
    id: `${f.name}-${f.lastModified}-${f.size}`,
    name: f.name.replace(/\.[^.]+$/, ''),
    url: URL.createObjectURL(f),
  }));
  input.value = '';
  activeIndex = 0;
  buildFeed();
  switchTab('home', true);
}

function handleMoreFiles(input) {
  const files = Array.from(input.files || []).filter(f => f.type.startsWith('video/'));
  if (!files.length) return;
  const newVids = files.map(f => ({
    id: `${f.name}-${f.lastModified}-${f.size}`,
    name: f.name.replace(/\.[^.]+$/, ''),
    url: URL.createObjectURL(f),
  }));
  videos = [...videos, ...newVids];
  input.value = '';
  buildFeed();
  switchTab('home');
}

// ──────────────────────────────────────────────
// Build reel feed
// ──────────────────────────────────────────────
function buildFeed() {
  const feed = document.getElementById('reel-feed');
  // Remove old observer
  if (observer) { observer.disconnect(); observer = null; }

  feed.innerHTML = '';

  videos.forEach((video, index) => {
    const slide = createSlide(video, index);
    feed.appendChild(slide);
  });

  // Show feed, hide empty state
  document.getElementById('empty-state').style.display = 'none';
  feed.style.display = 'block';
  document.getElementById('tab-bar').style.display = 'flex';

  // Setup intersection observer
  setupObserver();

  // Scroll to top
  requestAnimationFrame(() => {
    feed.scrollTo({ top: 0, behavior: 'instant' });
    setActiveSlide(0);
  });
}

function createSlide(video, index) {
  const slide = document.createElement('div');
  slide.className = 'reel-slide';
  slide.dataset.index = index;

  // Determine fav status
  const fav = favorites.some(f => f.id === video.id);

  slide.innerHTML = `
    <video class="reel-video" preload="metadata" playsinline webkit-playsinline muted></video>
    <div class="grad-top"></div>
    <div class="grad-bot"></div>

    <div class="spinner-wrap show" id="spinner-${index}">
      <div class="spinner"></div>
    </div>

    <div class="slide-top">
      <span class="slide-title">${escHtml(video.name)}</span>
      <button class="mute-btn" onclick="toggleMute(event)">
        ${muteIcon(isMuted)}
      </button>
    </div>

    <div class="slide-actions">
      <button class="action-btn" onclick="handleFavTap(event, '${escHtml(video.id)}')">
        <div class="action-icon" id="fav-icon-${index}">
          ${heartSVG(fav)}
        </div>
        <span class="action-label" id="fav-label-${index}">${fav ? 'Saved' : 'Save'}</span>
      </button>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="prog-${index}"></div>
    </div>

    <div class="center-overlay" id="play-flash-${index}">
      <div class="icon-bubble" id="flash-bubble-${index}"></div>
    </div>

    <div class="center-overlay clickable" id="replay-overlay-${index}" style="display:none">
      <button class="replay-panel" onclick="handleReplay(event, ${index})">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="white">
          <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
        <span>REPLAY</span>
      </button>
    </div>

    <svg class="dt-heart" id="dt-heart-${index}" width="110" height="110" viewBox="0 0 24 24" fill="#FF3B5C"
      style="filter: drop-shadow(0 0 20px rgba(255,59,92,0.6))">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  `;

  // Set up video element
  const vid = slide.querySelector('video');
  vid.src = video.url;
  vid.muted = isMuted;

  // Orientation detection
  vid.addEventListener('loadedmetadata', () => {
    const isVert = vid.videoHeight >= vid.videoWidth;
    vid.className = `reel-video ${isVert ? 'vertical' : 'horizontal'}`;
    document.getElementById(`spinner-${index}`).classList.remove('show');
  });
  vid.addEventListener('waiting', () => {
    document.getElementById(`spinner-${index}`).classList.add('show');
  });
  vid.addEventListener('canplay', () => {
    document.getElementById(`spinner-${index}`).classList.remove('show');
  });
  vid.addEventListener('timeupdate', () => {
    if (vid.duration) {
      const pct = (vid.currentTime / vid.duration) * 100;
      const prog = document.getElementById(`prog-${index}`);
      if (prog) prog.style.width = pct + '%';
    }
  });
  vid.addEventListener('ended', () => {
    const prog = document.getElementById(`prog-${index}`);
    if (prog) prog.style.width = '100%';
    const replay = document.getElementById(`replay-overlay-${index}`);
    if (replay) replay.style.display = 'flex';
  });

  // Tap handling on slide
  slide.addEventListener('click', (e) => handleSlideTap(e, index, video.id));

  return slide;
}

// ──────────────────────────────────────────────
// Intersection Observer
// ──────────────────────────────────────────────
function setupObserver() {
  const feed = document.getElementById('reel-feed');
  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
        const idx = parseInt(entry.target.dataset.index, 10);
        if (!isNaN(idx) && idx !== activeIndex) {
          setActiveSlide(idx);
        }
      }
    });
  }, { threshold: 0.6, root: feed });

  feed.querySelectorAll('.reel-slide').forEach(s => observer.observe(s));
}

function setActiveSlide(index) {
  // Pause previous
  const prevSlide = document.querySelector(`.reel-slide[data-index="${activeIndex}"]`);
  if (prevSlide && index !== activeIndex) {
    const prevVid = prevSlide.querySelector('video');
    if (prevVid) prevVid.pause();
  }

  activeIndex = index;
  saveLastIndex(index);

  const slide = document.querySelector(`.reel-slide[data-index="${index}"]`);
  if (!slide) return;

  const vid = slide.querySelector('video');
  if (!vid) return;

  // Hide replay, reset progress
  const replay = document.getElementById(`replay-overlay-${index}`);
  if (replay) replay.style.display = 'none';
  const prog = document.getElementById(`prog-${index}`);
  if (prog) prog.style.width = '0%';

  vid.currentTime = 0;
  vid.muted = isMuted;
  vid.play().catch(() => {});
}

// ──────────────────────────────────────────────
// Tap handling (single = play/pause, double = fav)
// ──────────────────────────────────────────────
function handleSlideTap(e, index, videoId) {
  // Ignore if clicking a button
  if (e.target.closest('button') || e.target.closest('.replay-panel')) return;

  tapCounts[index] = (tapCounts[index] || 0) + 1;

  if (tapCounts[index] === 1) {
    tapTimers[index] = setTimeout(() => {
      tapCounts[index] = 0;
      // Single tap: toggle play/pause
      const slide = document.querySelector(`.reel-slide[data-index="${index}"]`);
      if (!slide) return;
      const vid = slide.querySelector('video');
      if (!vid) return;
      const replay = document.getElementById(`replay-overlay-${index}`);
      if (replay && replay.style.display !== 'none') {
        handleReplay({ stopPropagation: ()=>{} }, index);
        return;
      }
      if (vid.paused) {
        vid.play().catch(()=>{});
        showFlash(index, true);
      } else {
        vid.pause();
        showFlash(index, false);
      }
    }, 240);
  } else if (tapCounts[index] === 2) {
    clearTimeout(tapTimers[index]);
    tapCounts[index] = 0;
    // Double tap: favorite + heart animation
    toggleFavorite(videoId, index);
    triggerDoubletapHeart(index);
  }
}

function showFlash(index, playing) {
  const bubble = document.getElementById(`flash-bubble-${index}`);
  if (!bubble) return;
  bubble.innerHTML = playing
    ? `<svg width="52" height="52" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>`
    : `<svg width="52" height="52" viewBox="0 0 24 24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
  bubble.classList.add('show');
  setTimeout(() => bubble.classList.remove('show'), 500);
}

function triggerDoubletapHeart(index) {
  const h = document.getElementById(`dt-heart-${index}`);
  if (!h) return;
  h.classList.remove('show');
  void h.offsetWidth;
  h.classList.add('show');
  setTimeout(() => h.classList.remove('show'), 750);
}

// ──────────────────────────────────────────────
// Replay
// ──────────────────────────────────────────────
function handleReplay(e, index) {
  e.stopPropagation && e.stopPropagation();
  const slide = document.querySelector(`.reel-slide[data-index="${index}"]`);
  if (!slide) return;
  const vid = slide.querySelector('video');
  const replay = document.getElementById(`replay-overlay-${index}`);
  const prog = document.getElementById(`prog-${index}`);
  if (replay) replay.style.display = 'none';
  if (prog) prog.style.width = '0%';
  if (vid) { vid.currentTime = 0; vid.play().catch(()=>{}); }
}

// ──────────────────────────────────────────────
// Mute
// ──────────────────────────────────────────────
function toggleMute(e) {
  e.stopPropagation();
  isMuted = !isMuted;
  // Update all videos
  document.querySelectorAll('.reel-video').forEach(v => { v.muted = isMuted; });
  // Update all mute buttons
  document.querySelectorAll('.mute-btn').forEach(btn => { btn.innerHTML = muteIcon(isMuted); });
}

function muteIcon(muted) {
  if (muted) return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
}

// ──────────────────────────────────────────────
// Favorites
// ──────────────────────────────────────────────
function toggleFavorite(videoId, index) {
  const existIdx = favorites.findIndex(f => f.id === videoId);
  const video = videos.find(v => v.id === videoId);
  if (!video) return;

  if (existIdx > -1) {
    favorites.splice(existIdx, 1);
  } else {
    favorites.push({ id: video.id, name: video.name, addedAt: Date.now() });
  }
  saveFavoritesLS();

  // Find current index if not provided
  if (index === undefined) index = videos.findIndex(v => v.id === videoId);

  // Update icon
  const isFav = favorites.some(f => f.id === videoId);
  const iconEl = document.getElementById(`fav-icon-${index}`);
  const labelEl = document.getElementById(`fav-label-${index}`);
  if (iconEl) {
    iconEl.innerHTML = heartSVG(isFav);
    iconEl.classList.remove('heart-pop');
    void iconEl.offsetWidth;
    if (isFav) iconEl.classList.add('heart-pop');
  }
  if (labelEl) labelEl.textContent = isFav ? 'Saved' : 'Save';

  // Update badge
  updateFavBadge();
}

function handleFavTap(e, videoId) {
  e.stopPropagation();
  const index = videos.findIndex(v => v.id === videoId);
  toggleFavorite(videoId, index);
}

function heartSVG(filled) {
  return `<svg width="26" height="26" viewBox="0 0 24 24" fill="${filled ? '#FF3B5C' : 'none'}" stroke="${filled ? '#FF3B5C' : 'white'}" stroke-width="2">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>`;
}

function updateFavBadge() {
  const badge = document.getElementById('fav-badge');
  if (!badge) return;
  if (favorites.length > 0) {
    badge.style.display = 'block';
    badge.textContent = favorites.length > 99 ? '99+' : favorites.length;
  } else {
    badge.style.display = 'none';
  }
}

// ──────────────────────────────────────────────
// Tab switching
// ──────────────────────────────────────────────
function switchTab(tab, force) {
  activeTab = tab;

  const homeBtn = document.getElementById('tab-home');
  const favBtn = document.getElementById('tab-fav');
  const favsPage = document.getElementById('favorites-page');
  const feed = document.getElementById('reel-feed');

  if (tab === 'home') {
    homeBtn.classList.add('active');
    favBtn.classList.remove('active', 'active-fav');
    favsPage.style.display = 'none';
    if (videos.length > 0) {
      feed.style.display = 'block';
      // Resume active video
      const slide = document.querySelector(`.reel-slide[data-index="${activeIndex}"]`);
      if (slide) {
        const vid = slide.querySelector('video');
        if (vid && vid.paused) vid.play().catch(()=>{});
      }
    }
    // Update fav icon
    document.getElementById('fav-icon').setAttribute('fill', 'none');
    document.getElementById('fav-icon').setAttribute('stroke', 'rgba(255,255,255,0.5)');
    // Home icon
    document.getElementById('home-icon').setAttribute('fill', 'white');
  } else {
    homeBtn.classList.remove('active');
    favBtn.classList.add('active-fav');
    // Pause active video
    const slide = document.querySelector(`.reel-slide[data-index="${activeIndex}"]`);
    if (slide) { const vid = slide.querySelector('video'); if (vid) vid.pause(); }

    // Render favorites
    renderFavoritesPage();
    favsPage.style.display = 'flex';
    favsPage.style.animation = 'none';
    void favsPage.offsetWidth;
    favsPage.style.animation = '';

    document.getElementById('fav-icon').setAttribute('fill', '#FF3B5C');
    document.getElementById('fav-icon').setAttribute('stroke', 'none');
    document.getElementById('home-icon').setAttribute('fill', 'rgba(255,255,255,0.5)');
  }
}

function renderFavoritesPage() {
  const grid = document.getElementById('fav-grid');
  const empty = document.getElementById('fav-empty');
  const countLabel = document.getElementById('fav-count-label');

  const favVideos = favorites
    .map(fav => videos.find(v => v.id === fav.id))
    .filter(Boolean);

  countLabel.textContent = favVideos.length === 0
    ? 'No favorites yet'
    : `${favVideos.length} video${favVideos.length > 1 ? 's' : ''}`;

  if (favVideos.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'flex';
    return;
  }

  grid.style.display = 'grid';
  empty.style.display = 'none';
  grid.innerHTML = '';

  favVideos.forEach((video, i) => {
    const card = document.createElement('div');
    card.className = 'fav-card fade-in-up';
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <video src="${video.url}" preload="metadata" muted playsinline webkit-playsinline class=""></video>
      <div class="fav-card-grad"></div>
      <div class="fav-card-name">${escHtml(video.name)}</div>
      <div class="fav-play-btn">
        <div class="fav-play-circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white" style="margin-left:2px">
            <path d="M8 5v14l11-7z"/>
          </svg>
        </div>
      </div>
      <div class="fav-heart-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#FF3B5C">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
    `;
    card.addEventListener('click', () => playVideoFromFavorites(video.id));
    grid.appendChild(card);
  });
}

function playVideoFromFavorites(videoId) {
  const idx = videos.findIndex(v => v.id === videoId);
  if (idx === -1) return;
  switchTab('home');
  requestAnimationFrame(() => {
    const slide = document.querySelector(`.reel-slide[data-index="${idx}"]`);
    if (slide) slide.scrollIntoView({ behavior: 'smooth' });
  });
}

// ──────────────────────────────────────────────
// Helpers
// ──────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init badge on load
updateFavBadge();

// ──────────────────────────────────────────────
// Service Worker Registration
// ──────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Inline SW as blob for single-file operation
    const swCode = `
const CACHE='reelplay-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim();});
self.addEventListener('fetch',e=>{if(e.request.method!=='GET'||e.request.url.startsWith('blob:')||e.request.url.startsWith('data:'))return;e.respondWith(caches.match(e.request).then(c=>{if(c)return c;return fetch(e.request).then(r=>{if(!r||r.status!==200||r.type!=='basic')return r;const cl=r.clone();caches.open(CACHE).then(cache=>cache.put(e.request,cl));return r;}).catch(()=>new Response('offline'));}))}); `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).catch(() => {});
  });
}

// Manifest injection (dynamic for single-file)

(function injectManifest() {

    description: 'Personal offline reel video player',
    start_url: '.',
    display: 'fullscreen',
    orientation: 'portrait',
    background_color: '#000000',

    icons: [{
      src: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="38" fill="#000"/><rect x="16" y="32" width="160" height="128" rx="20" fill="none" stroke="white" stroke-width="10"/><polygon points="80,72 80,120 130,96" fill="#FF3B5C"/></svg>`),
      sizes: '192x192',
      type: 'image/svg+xml',
